<!doctype html>
<html lang="en" suppressHydrationWarning>
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="theme-color" content="#0b0f1a" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="EduSphere AI" />
    <title>EduSphere AI – Smart School Management</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <meta name="description" content="AI-Powered Smart School Management & Attendance System - Mobile First Premium PWA" />
    <style>
      html { -webkit-text-size-adjust: 100%; }
      body { overscroll-behavior-y: none; -webkit-tap-highlight-color: transparent; }
      #root { min-height: 100dvh; }
    </style>
    <script>
      // Prevent dark mode flash – apply theme before React
      (function(){
        try {
          var t = localStorage.getItem('edusphere-theme') || 'system';
          var m = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          var r = t === 'system' ? m : t;
          document.documentElement.classList.add(r);
          document.documentElement.style.colorScheme = r;
        } catch(e){}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
